<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Career Clarity Platform</title>
  </head>
  <body>
    <div id="root"></div>

    <!-- Hidden form declarations: Netlify's build bot scans deployed HTML
         for these and provisions the collection endpoints. The real UI is
         React; it POSTs matching form-names to "/" (see src/lib/netlifyForms.js).
         Submissions land in Netlify dashboard -> Forms. -->
    <form name="support-ticket" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input name="bot-field" />
      <input name="message" />
      <input name="contact" />
    </form>
    <form name="booking" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input name="bot-field" />
      <input name="bookingId" />
      <input name="practitioner" />
      <input name="session" />
      <input name="when" />
      <input name="name" />
      <input name="contact" />
    </form>
    <form name="practitioner-application" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input name="bot-field" />
      <input name="name" />
      <input name="role" />
      <input name="topics" />
      <input name="contact" />
    </form>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
